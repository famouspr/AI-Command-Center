name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # We only typecheck and bundle here (never launch Electron), so skip the
      # ~100 MB Electron binary download to keep CI fast.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Type-check (main + renderer)
        run: npm run typecheck

      - name: Build (main / preload / renderer)
        run: npm run build
